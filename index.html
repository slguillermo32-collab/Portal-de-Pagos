async function demoPost(listName, data) {
  const newId = Date.now();

  const map = {
    'Solicitudes':    _demoStore.solicitudes,
    'Proveedores':    _demoStore.proveedores,

    'Usuarios_Portal':_demoStore.usuarios,

  };
  if (map[listName]) map[listName].unshift(item);

}

async function demoPatch(listName, id, data) {
  const map = {
    'Solicitudes':    _demoStore.solicitudes,
    'Proveedores':    _demoStore.proveedores,
    'Razones':        _demoStore.razones,
    'Usuarios_Portal':_demoStore.usuarios,
  };
  if (map[listName]) {
    const idx = map[listName].findIndex(x => String(x.Id) === String(id));
    if (idx >= 0) map[listName][idx] = {...map[listName][idx], ...data};
  }
}

// ── Override API functions in DEMO_MODE ───────────────────────────
async function spGet(listName, filter='', top=500) {
  if (DEMO_MODE) return demoGet(listName);
  // ... real Graph call below
  const token = await getToken();
  const siteId = await getSiteId();
  const listId = await getListId(listName);
  let url = GRAPH + '/sites/' + siteId + '/lists/' + listId + '/items?expand=fields&$top=' + top;
  if (filter) url += '&$filter=' + filter;
  const r = await fetch(url, {headers:{'Authorization':'Bearer '+token,'Accept':'application/json'}});
  if (!r.ok) { const e=await r.text(); console.error('spGet ERROR:', r.status, e); throw new Error('Error leyendo ' + listName + ' | ' + r.status); }
  const d = await r.json();
  return (d.value||[]).map(item => ({Id:item.id, ...item.fields}));
}

async function spPost(listName, data) {
  if (DEMO_MODE) return demoPost(listName, data);
  const token = await getToken();
  const siteId = await getSiteId();
  const listId = await getListId(listName);
  const url = GRAPH + '/sites/' + siteId + '/lists/' + listId + '/items';
  const r = await fetch(url, {method:'POST', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body: JSON.stringify({fields: data})});
  if (!r.ok) { const e=await r.text(); throw new Error('Error creando en ' + listName + ': ' + r.status); }
  const d = await r.json();
  return {Id: d.id, ...d.fields};
}

async function spPatch(listName, id, data) {
  if (DEMO_MODE) { await demoPatch(listName, id, data); return; }
  const token = await getToken();
  const siteId = await getSiteId();
  const listId = await getListId(listName);
  const url = GRAPH + '/sites/' + siteId + '/lists/' + listId + '/items/' + id + '/fields';
  const r = await fetch(url, {method:'PATCH', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body: JSON.stringify(data)});
  if (!r.ok) { const e=await r.text(); throw new Error('Error actualizando en ' + listName + ': ' + r.status); }
}

async function spDelete(listName, id) {
  if (DEMO_MODE) { return; }
  const token = await getToken();
  const siteId = await getSiteId();
  const listId = await getListId(listName);
  const url = GRAPH + '/sites/' + siteId + '/lists/' + listId + '/items/' + id;
  await fetch(url, {method:'DELETE', headers:{'Authorization':'Bearer '+token}});
}

    redirectUri: window.location.href.split('?')[0],

};

const msalInstance = new msal.PublicClientApplication(msalConfig);

const SCOPES = ['User.Read','Sites.ReadWrite.All'];

// ── SHAREPOINT API ────────────────────────────────────────────────
async function getToken() {
  if (DEMO_MODE) return 'demo-token';
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) throw new Error('No hay sesión');
  try {
    const r = await msalInstance.acquireTokenSilent({scopes:SCOPES, account:accounts[0]});
    return r.accessToken;
  } catch(e) {
    await msalInstance.acquireTokenRedirect({scopes:SCOPES});
    return null;
  }
}

const GRAPH = 'https://graph.microsoft.com/v1.0';
const SP_HOSTNAME = 'fyttsa.sharepoint.com';
const SP_SITEPATH = 'sites/PortaldePagos';
let _siteId = null;
let _listIds = {};

async function getSiteId() {
  if (DEMO_MODE) return 'demo-site-id';
  if (_siteId) return _siteId;
  const token = await getToken();
  const r = await fetch(GRAPH + '/sites/' + SP_HOSTNAME + ':/' + SP_SITEPATH + ':', {
    headers: {'Authorization':'Bearer '+token, 'Accept':'application/json'}
  });
  if (!r.ok) { const e=await r.text(); throw new Error('No se pudo obtener el sitio: ' + r.status + ' ' + e.substring(0,100)); }
  const d = await r.json();
  _siteId = d.id;
  return _siteId;
}

async function getListId(listName) {
  if (DEMO_MODE) return 'demo-list-' + listName;
  if (_listIds[listName]) return _listIds[listName];
  const token = await getToken();
  const siteId = await getSiteId();
  const url = GRAPH + "/sites/" + siteId + "/lists?$filter=displayName eq '" + listName + "'";
  const r = await fetch(url, {headers: {Authorization: "Bearer " + token, Accept: "application/json"}});
  if (!r.ok) { const e = await r.text(); throw new Error('Lista no encontrada: ' + listName + ' | ' + r.status); }
  const d = await r.json();
  if (!d.value || d.value.length === 0) throw new Error('Lista "' + listName + '" no existe en SharePoint.');
  _listIds[listName] = d.value[0].id;
  return _listIds[listName];
}

// ── EXTRACTOR DE PDF/XML (con modo demo) ─────────────────────────
async function extractDocument(file, apiKey) {
  if (DEMO_MODE) {
    // Simulate a 1.5s delay like a real API call
    await new Promise(r => setTimeout(r, 1500));
    // Return realistic fake data
    return {
      ok: true,
      rfcEm: 'FIS890101ABC',
      nomEm: 'Ferretería Industrial SA de CV',
      rfcRec: 'CFY850101MNO',
      nomRec: 'Constructora FYTTSA SA de CV',
      usoCFDI: 'G03',
      metodoPago: 'PPD',
      formaPago: '03',
      fecha: new Date().toISOString().split('T')[0],
      subtotal: 73275.86,
      iva: 11724.14,
      ivaRet: 0,
      total: 85000,
      uuid: 'A1B2C3D4-E5F6-7890-ABCD-EF1234567890',
      esCot: false,
    };
  }
  // Real extraction via Claude API
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const base64 = e.target.result;
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
          body: JSON.stringify({
            model: 'claude-sonnet-4-5',
            max_tokens: 800,
            messages: [{role:'user', content:[
              {type: file.type==='application/pdf'?'document':'image', source:{type:'base64',media_type:file.type,data:base64.split(',')[1]}},
              {type:'text', text:'Extrae datos de este documento fiscal mexicano. Responde SOLO JSON sin markdown: {"rfcEm":"","nomEm":"","rfcRec":"","nomRec":"","usoCFDI":"","metodoPago":"","formaPago":"","fecha":"YYYY-MM-DD","subtotal":0,"iva":0,"ivaRet":0,"total":0,"uuid":"","esCot":false}'}
            ]}]
          })
        });
        const data = await resp.json();
        const text = data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
        const parsed = JSON.parse(text);
        resolve({ok:true, ...parsed});
      } catch(e) {
        resolve({ok:false, error:e.message});
      }
    };
    reader.readAsDataURL(file);
  });
}

  async function guardar(){
    if(!form.Proveedor||!form.Area||!form.Categoria||!form.Importe){pop('Completa los campos obligatorios','err');return;}
    setSaving(true);
    try{
      const folio=form.Folio||genFolio(sols);
      const data={...form,Folio:folio,Title:folio,Fecha_Captura:form.Fecha_Captura||new Date().toISOString()};
      if(sel){
        await spPatch('Solicitudes',sel.Id||sel.id,data);

        const created=await spPost('Solicitudes',data);

// ── MÓDULO APROBACIONES ───────────────────────────────────────────
function ModAprobaciones({user,rol,onBack,pop}){
  const [sols,setSols]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [nota,setNota]=useState('');
  const [saving,setSaving]=useState(false);
  const [showMotivo,setShowMotivo]=useState(false);
  const [motivoReprog,setMotivoReprog]=useState('');
  const [comprobante,setComprobante]=useState(null);

  useEffect(()=>{
    spGet('Solicitudes','',1000).then(s=>{setSols(s);setLoading(false);}).catch(e=>{pop('Error: '+e.message,'err');setLoading(false);});
  },[]);

  const porAprobar=sols.filter(x=>x.Status==='Capturado');
  const enRevision=sols.filter(x=>x.Status==='En revisión contable'||x.Status==='Autorizado por contabilidad');

  async function aprobar(ok){
    if(!ok&&!nota.trim()){pop('Escribe el motivo del rechazo','err');return;}
    setSaving(true);
    const LIMITE_2A=20000;
    let nextStatus;
    if(!ok) nextStatus='Rechazado';
    else if(sel.Importe>=LIMITE_2A&&sel.Status==='Capturado') nextStatus='En revisión contable';
    else nextStatus='En revisión contable';
    try{
      await spPatch('Solicitudes',sel.Id,{Status:nextStatus,Notas_Finanzas:(nota||'')});
      setSols(prev=>prev.map(x=>x.Id===sel.Id?{...x,Status:nextStatus}:x));
      logBitacora(user.displayName,ok?'Aprobó solicitud':'Rechazó solicitud',(sel.Folio||sel.Title)+' · '+sel.Proveedor+' · '+nextStatus,'Aprobaciones');
      setSel(null);setNota('');
      pop(ok?'✓ Aprobada':'Rechazada');
    }catch(e){pop('Error: '+e.message,'err');}
    setSaving(false);
  }

  if(loading) return <div style={{textAlign:'center',padding:60,color:'var(--text3)'}}>Cargando…</div>;

  if(sel) return <div style={{maxWidth:780}} className="fade-in">
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <button style={S.btnS} onClick={()=>{setSel(null);setNota('');}}>← Volver</button>
      <div><div style={{...S.mono,color:'var(--green)',fontWeight:700}}>{sel.Folio}</div><div style={S.h1}>{sel.Proveedor}</div></div>
      <div style={{marginLeft:'auto'}}><Badge val={sel.Status} map={ST_COL}/></div>
    </div>
    <DupBanner sol={sel} sols={sols}/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <div style={S.card}>
        <div style={S.h2}>Detalle de la solicitud</div>
        <KV label="Proveedor" val={sel.Proveedor}/>
        <KV label="Área · Categoría" val={sel.Area+' · '+sel.Categoria}/>
        {sel.Centro_Costo&&<KV label="Centro de costo" val={sel.Centro_Costo}/>}
        <KV label="No. Factura" val={sel.Factura} mono/>
        <KV label="Método" val={sel.Metodo_Pago}/>
        <KV label="Solicitante" val={sel.Solicitante}/>
        {sel.Notas&&<div style={{marginTop:10,padding:'8px 10px',background:'#FFFBEB',borderRadius:'var(--radius)',fontSize:12,lineHeight:1.6,borderLeft:'2px solid #F59E0B'}}>{sel.Notas}</div>}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:12}}>
          <span style={{fontSize:13,color:'var(--text2)'}}>Importe</span>
          <span style={{fontSize:22,fontWeight:700,fontFamily:'monospace',color:'var(--green)'}}>{fmt(sel.Importe)}</span>
        </div>
      </div>
      <div style={S.card}>
        <div style={S.h2}>Tu decisión</div>
        <div style={{padding:'10px 12px',background:'var(--orange-bg)',borderRadius:'var(--radius)',fontSize:12,color:'var(--orange-text)',marginBottom:14,lineHeight:1.7}}>Al aprobar confirmas que el gasto es necesario y el monto es correcto.</div>
        <label style={S.lbl}>Notas {!sel.aprobacion&&'(obligatorio si rechazas)'}</label>
        <textarea style={{...S.inp,minHeight:80,resize:'vertical',marginBottom:14}} value={nota} onChange={e=>setNota(e.target.value)} placeholder="Motivo, instrucciones…"/>
        <div style={{display:'flex',gap:10}}>
          <button style={{...S.btnR,flex:1}} onClick={()=>aprobar(false)} disabled={saving}>✕ Rechazar</button>
          <button style={{...S.btnP,flex:1}} onClick={()=>aprobar(true)} disabled={saving}>✓ Aprobar →</button>
        </div>
      </div>
    </div>
  </div>;

  return <div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
      <div><div style={S.h1}>Aprobaciones</div><div style={{fontSize:13,color:'var(--text2)'}}>{porAprobar.length} pendientes de aprobar</div></div>
      <button style={S.btnS} onClick={onBack}>← Portal</button>
    </div>
    {porAprobar.length===0
      ?<div style={{...S.card,textAlign:'center',padding:40,color:'var(--text3)'}}><div style={{fontSize:28,marginBottom:8}}>✅</div>Sin solicitudes pendientes</div>
      :<div style={{...S.card,padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>{['Folio','Proveedor','Importe','Prior.','Solicitante'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{porAprobar.map(x=><tr key={x.Id} onClick={()=>{setSel(x);setNota('');}} style={{cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
            <td style={{...S.td,...S.mono,color:'var(--green)',fontWeight:700}}>{x.Folio||x.Title}</td>
            <td style={S.td}><div style={{fontWeight:500}}>{x.Proveedor}</div><div style={{fontSize:11,color:'var(--text2)'}}>{x.Razon_Social}</div></td>
            <td style={{...S.td,fontFamily:'monospace',fontWeight:600}}>{fmt(x.Importe)}</td>
            <td style={S.td}><Badge val={x.Prioridad||'Media'} map={PR_COL}/></td>
            <td style={{...S.td,fontSize:12}}>{x.Solicitante}</td>
          </tr>)}</tbody>
        </table>
      </div>
    }
  </div>;
}

// ── MÓDULO FINANZAS (básico) ──────────────────────────────────────
function ModFinanzas({user,rol,onBack,pop}){
  const [sols,setSols]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [fSt,setFSt]=useState('');
  const [fFP,setFFP]=useState('');
  const [fNt,setFNt]=useState('');
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    spGet('Solicitudes','',1000).then(s=>{setSols(s);setLoading(false);}).catch(e=>{pop('Error: '+e.message,'err');setLoading(false);});
  },[]);

  const [finFiltro,setFinFiltro]=useState('todos');
  const hoyStr2=new Date().toISOString().split('T')[0];
  const semStr=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  const mesStr2=new Date().toISOString().slice(0,7);
  const porPagar=sols.filter(x=>{
    const base=['Autorizado por contabilidad','En revisión financiera','Programado'].includes(x.Status);
    if(!base&&finFiltro!=='pagados') return false;
    if(finFiltro==='pagados') return x.Status==='Pagado';
    if(finFiltro==='hoy') return (x.Fecha_Programada||'').startsWith(hoyStr2);
    if(finFiltro==='semana') return (x.Fecha_Programada||'')>=semStr;
    if(finFiltro==='mes') return (x.Fecha_Programada||'').startsWith(mesStr2);
    return true;
  });
  const pagados=sols.filter(x=>x.Status==='Pagado');

  function openSol(x){setSel(x);setFSt(x.Status);setFFP(x.Fecha_Programada||'');setFNt(x.Notas_Finanzas||'');setShowMotivo(false);setMotivoReprog('');setComprobante(null);}

  async function guardar(){
    setSaving(true);
    try{
      const notaFinal=motivoReprog?fNt+(fNt?'\n':'')+'Reprogramado: '+motivoReprog:fNt;
      await spPatch('Solicitudes',sel.Id,{Status:fSt,Fecha_Programada:fFP||null,Notas_Finanzas:notaFinal,Fecha_Pago:fSt==='Pagado'?new Date().toISOString().split('T')[0]:null});
      setSols(prev=>prev.map(x=>x.Id===sel.Id?{...x,Status:fSt,Fecha_Programada:fFP,Notas_Finanzas:notaFinal}:x));
      logBitacora(user.displayName,'Actualizó pago',(sel.Folio||sel.Title)+' → '+fSt+(fFP?' · Prog: '+fFP:''),'Finanzas');
      setSel(null);pop('✓ Guardado');
    }catch(e){pop('Error: '+e.message,'err');}
    setSaving(false);
  }

  if(loading) return <div style={{textAlign:'center',padding:60,color:'var(--text3)'}}>Cargando…</div>;

  const kpis={
    porPagar:{t:porPagar.reduce((a,x)=>a+(x.Importe||0),0),n:porPagar.length},
    pagado:{t:pagados.reduce((a,x)=>a+(x.Importe||0),0),n:pagados.length},
  };

  if(sel) return <div style={{maxWidth:780}} className="fade-in">
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <button style={S.btnS} onClick={()=>setSel(null)}>← Volver</button>
      <div><div style={{...S.mono,color:'var(--green)',fontWeight:700}}>{sel.Folio}</div><div style={S.h1}>{sel.Proveedor}</div></div>
      <div style={{marginLeft:'auto'}}><Badge val={sel.Status} map={ST_COL}/></div>
    </div>
    <DupBanner sol={sel} sols={sols}/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <div style={S.card}>
        <div style={S.h2}>Datos</div>
        <KV label="Proveedor" val={sel.Proveedor}/>
        <KV label="Categoría" val={sel.Categoria}/>
        <KV label="Método" val={sel.Metodo_Pago}/>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:12}}><span style={{fontSize:13,color:'var(--text2)'}}>A pagar</span><span style={{fontSize:22,fontWeight:700,fontFamily:'monospace',color:'var(--green)'}}>{fmt(sel.Importe)}</span></div>
      </div>
      <div style={S.card}>
        <div style={S.h2}>Gestión del pago</div>
        <div style={{display:'grid',gap:12}}>
          <div><label style={S.lbl}>Status</label>
            <select style={S.sel} value={fSt} onChange={e=>setFSt(e.target.value)}>
              {['En revisión financiera','Programado','Pagado','Cancelado'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div><label style={S.lbl}>Fecha programada de pago</label><input type="date" style={S.inp} value={fFP} onChange={e=>setFFP(e.target.value)}/></div>
          <div><label style={S.lbl}>Notas de finanzas</label><textarea style={{...S.inp,minHeight:60,resize:'vertical'}} value={fNt} onChange={e=>setFNt(e.target.value)} placeholder="Instrucciones, referencia…"/></div>
          <button style={S.btnP} onClick={guardar} disabled={saving}>{saving?'Guardando…':'Guardar →'}</button>
        </div>
      </div>
    </div>
  </div>;

  return <div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
      <div><div style={S.h1}>Finanzas</div><div style={{fontSize:13,color:'var(--text2)'}}>{porPagar.length} por programar o pagar</div></div>
      <button style={S.btnS} onClick={onBack}>← Portal</button>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
      {[{id:'todos',l:'Todos'},{id:'hoy',l:'Hoy'},{id:'semana',l:'Esta semana'},{id:'mes',l:'Este mes'},{id:'pagados',l:'Pagados'}].map(f=><button key={f.id} onClick={()=>setFinFiltro(f.id)} style={{padding:'6px 14px',borderRadius:20,border:'1px solid '+(finFiltro===f.id?'var(--blue)':'var(--border)'),background:finFiltro===f.id?'var(--blue)':'transparent',color:finFiltro===f.id?'white':'var(--text2)',fontSize:12,fontWeight:finFiltro===f.id?600:400,cursor:'pointer'}}>{f.l}</button>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
      {[{l:'Por pagar',k:kpis.porPagar,bg:'var(--orange-bg)',c:'var(--orange-text)'},{l:'Pagado total',k:kpis.pagado,bg:'var(--green-bg)',c:'var(--green-text)'}].map(kp=><div key={kp.l} style={{background:kp.bg,borderRadius:'var(--radius-lg)',padding:'14px 16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:kp.c,marginBottom:4,opacity:.8}}>{kp.l}</div>
        <div style={{fontSize:20,fontWeight:700,color:kp.c,fontFamily:'monospace'}}>{fmt(kp.k.t)}</div>
        <div style={{fontSize:12,color:kp.c,opacity:.7}}>{kp.k.n} solicitudes</div>
      </div>)}
    </div>
    {porPagar.length===0
      ?<div style={{...S.card,textAlign:'center',padding:40,color:'var(--text3)'}}><div style={{fontSize:28,marginBottom:8}}>💼</div>Sin pagos pendientes</div>
      :<div style={{...S.card,padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>{['Folio','Proveedor','Importe','Método','Status','Fecha prog.'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{porPagar.map(x=><tr key={x.Id} onClick={()=>openSol(x)} style={{cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
            <td style={{...S.td,...S.mono,color:'var(--green)',fontWeight:700}}>{x.Folio||x.Title}</td>
            <td style={S.td}><div style={{fontWeight:500}}>{x.Proveedor}</div><div style={{fontSize:11,color:'var(--text2)'}}>{x.Razon_Social}</div></td>
            <td style={{...S.td,fontFamily:'monospace',fontWeight:600}}>{fmt(x.Importe)}</td>
            <td style={S.td}><Badge val={x.Metodo_Pago||'Transferencia'} /></td>
            <td style={S.td}><Badge val={x.Status} map={ST_COL}/></td>
            <td style={S.td}><div style={{fontSize:12,color:'var(--blue)'}}>{fmtD(x.Fecha_Programada)}</div><SemaforoBadge fechaReq={x.Fecha_Programada} status={x.Status}/></td>
          </tr>)}</tbody>
        </table>
      </div>
    }
  </div>;
}

// ── MÓDULO USUARIOS ───────────────────────────────────────────────
function ModUsuarios({user,onBack,pop}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState(null);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    spGet('Usuarios_Portal').then(u=>{setUsers(u);setLoading(false);}).catch(e=>{pop('Error: '+e.message,'err');setLoading(false);});
  },[]);

  const FORM0={Title:'',Correo:'',Rol:'Solicitante',Activo:true,Razones:''};
  const sf=p=>setForm(prev=>({...prev,...p}));

  async function guardar(){
    if(!form.Correo||!form.Rol){pop('Correo y rol son requeridos','err');return;}
    setSaving(true);
    try{
      const data={Title:form.Correo,Correo:form.Correo,Rol:form.Rol,Activo:form.Activo,Razones:form.Razones||''};
      if(form.Id){
        await spPatch('Usuarios_Portal',form.Id,data);
        setUsers(prev=>prev.map(x=>x.Id===form.Id?{...x,...data}:x));
      } else {
        const created=await spPost('Usuarios_Portal',data);
        setUsers(prev=>[...prev,created]);
      }
      logBitacora(user.displayName,form.Id?'Editó usuario':'Creó usuario',form.Correo+' · Rol: '+form.Rol,'Usuarios');
      setForm(null);pop('✓ Usuario guardado');
    }catch(e){pop('Error: '+e.message,'err');}
    setSaving(false);
  }

  if(loading) return <div style={{textAlign:'center',padding:60,color:'var(--text3)'}}>Cargando…</div>;

  return <div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
      <div><div style={S.h1}>Gestión de usuarios</div><div style={{fontSize:13,color:'var(--text2)'}}>{users.length} usuarios registrados</div></div>
      <div style={{display:'flex',gap:8}}>
        <button style={S.btnS} onClick={onBack}>← Portal</button>
        <button style={S.btnP} onClick={()=>setForm({...FORM0})}>+ Nuevo usuario</button>
      </div>
    </div>

    <div style={{...S.card,background:'var(--blue-bg)',borderColor:'#93C5FD',marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:600,color:'var(--blue)',marginBottom:6}}>¿Cómo funciona el acceso?</div>
      <div style={{fontSize:12,color:'var(--blue-text)',lineHeight:1.8}}>
        El login es automático con la cuenta de Microsoft. Aquí defines qué rol tiene cada persona dentro del portal. Solo usuarios registrados aquí pueden acceder.
      </div>
    </div>

    <div style={{...S.card,padding:0,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr>{['Correo','Rol','Acceso','Status',''].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
        <tbody>
          {users.length===0&&<tr><td colSpan={5} style={{...S.td,textAlign:'center',padding:32,color:'var(--text3)'}}>Sin usuarios registrados</td></tr>}

// ── BANNER DE DUPLICADOS ──────────────────────────────────────────
function DupBanner({sol, sols}){
  if(!sol||!sols) return null;
  const dups=sols.filter(x=>
    x.Id!==sol.Id &&
    x.Status!=='Cancelado' &&
    x.Status!=='Rechazado' &&
    x.Status!=='Rechazado por contabilidad' &&
    sol.Factura && x.Factura &&
    x.Factura.trim().toLowerCase()===sol.Factura.trim().toLowerCase()
  );
  if(!dups.length) return null;
  return <div style={{padding:'12px 16px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:'var(--radius)',marginBottom:16,borderLeft:'4px solid var(--red)'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
      <span style={{fontSize:16}}>⚠️</span>
      <span style={{fontWeight:700,fontSize:13,color:'var(--red-text)'}}>POSIBLE DUPLICADO DETECTADO</span>
    </div>
    {dups.map(d=><div key={d.Id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',background:'white',borderRadius:'var(--radius)',border:'1px solid #FCA5A5',marginBottom:4}}>
      <div>
        <span style={{fontFamily:'monospace',fontWeight:700,color:'var(--red)',fontSize:12}}>{d.Folio||d.Title}</span>
        <span style={{fontSize:12,color:'var(--text2)',marginLeft:8}}>{d.Proveedor} · {fmt(d.Importe)}</span>
      </div>
      <Badge val={d.Status} map={ST_COL}/>
    </div>)}
    <div style={{fontSize:11,color:'var(--red-text)',marginTop:6}}>Verifica antes de continuar — misma factura/UUID en otra solicitud.</div>
  </div>;
}


// ── SEMÁFORO DE VENCIMIENTO ───────────────────────────────────────
function semaforo(fechaReq, status){
  if(['Pagado','Cancelado','Rechazado','Rechazado por contabilidad'].includes(status)) return null;
  if(!fechaReq) return null;
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const fecha=new Date(fechaReq); fecha.setHours(0,0,0,0);
  const dias=Math.round((fecha-hoy)/(1000*60*60*24));
  if(dias<0)  return {color:'#C8251F',bg:'#FEF0EF',label:'Vencida',dias:Math.abs(dias),icon:'🔴'};
  if(dias<=3) return {color:'#C06C0A',bg:'#FEF3E2',label:'Urgente',dias,icon:'🟡'};
  return      {color:'#0F8A65',bg:'#E6F4EF',label:'A tiempo',dias,icon:'🟢'};
}

function SemaforoBadge({fechaReq, status}){
  const s=semaforo(fechaReq,status);
  if(!s) return null;
  return <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:s.bg,color:s.color,fontWeight:600,whiteSpace:'nowrap'}}>
    {s.icon} {s.label} {s.dias===0?'hoy':(s.dias===1?'mañana':(s.dias<0?s.dias+' días':s.dias+'d'))}
  </span>;
}

            <td style={S.td}><div style={{fontWeight:500}}>{p.Title||p.Nombre}</div>{p.Clave&&<span style={{fontSize:10,fontFamily:'monospace',background:'var(--green-bg)',color:'var(--green)',padding:'1px 6px',borderRadius:10}}>{p.Clave}</span>}</td>
            <td style={{...S.td,...S.mono}}>{p.RFC||'—'}</td>
            <td style={S.td}>{p.Banco||'—'}</td>
            <td style={{...S.td,...S.mono,fontSize:11}}>{p.CLABE?p.CLABE.slice(0,6)+'…':'—'}</td>
            <td style={S.td}><button onClick={()=>{setForm({...FORM0_PROV,...p});setTipo('prov');}} style={{...S.btnS,fontSize:11,padding:'4px 10px'}}>✏️</button></td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>}

    {tab==='razones'&&<div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
        <button style={S.btnP} onClick={()=>{setForm({...FORM0_RAZ});setTipo('raz');}}>+ Nueva razón social</button>
      </div>
      <div style={{...S.card,padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>{['Nombre','RFC',''].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>{razones.map(r=><tr key={r.Id} onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
            <td style={S.td}><div style={{fontWeight:500}}>{r.Title||r.Nombre}</div></td>
            <td style={{...S.td,...S.mono}}>{r.RFC||'—'}</td>
            <td style={S.td}><button onClick={()=>{setForm({...FORM0_RAZ,...r});setTipo('raz');}} style={{...S.btnS,fontSize:11,padding:'4px 10px'}}>✏️</button></td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>}

    {(tab==='categorias'||tab==='areas')&&<div style={S.card}>
      <div style={S.h2}>{tab==='categorias'?'Categorías de gasto':'Áreas'}</div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <input style={{...S.inp,flex:1}} placeholder={tab==='categorias'?'Nueva categoría…':'Nueva área…'} value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCatArea(tab==='categorias'?cats:areas,tab==='categorias'?setCats:setAreas,tab==='categorias'?'Catalogo_Cats':'Catalogo_Areas')}/>
        <button style={S.btnP} disabled={saving} onClick={()=>addCatArea(tab==='categorias'?cats:areas,tab==='categorias'?setCats:setAreas,tab==='categorias'?'Catalogo_Cats':'Catalogo_Areas')}>+ Agregar</button>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {(tab==='categorias'?cats:areas).map((item,i)=><div key={i} style={{padding:'6px 12px',background:'var(--bg2)',borderRadius:20,border:'1px solid var(--border)',fontSize:13}}>{item}</div>)}
      </div>
    </div>}

    {form&&<Modal onClose={()=>setForm(null)} maxW={480}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>{tipo==='prov'?(form.Id?'Editar proveedor':'Nuevo proveedor'):(form.Id?'Editar razón social':'Nueva razón social')}</div>
      <div style={{display:'grid',gap:12}}>
        <div><Lbl req>Nombre</Lbl><input style={S.inp} value={form.Title||''} onChange={e=>sf({Title:e.target.value})}/></div>
        <div><Lbl>RFC</Lbl><input style={S.inp} placeholder="RFC" value={form.RFC||''} onChange={e=>sf({RFC:e.target.value.toUpperCase()})}/></div>
        {tipo==='prov'&&<>
          <div><Lbl>CLABE</Lbl><input style={S.inp} placeholder="18 dígitos" value={form.CLABE||''} onChange={e=>sf({CLABE:e.target.value})}/></div>
          <div><Lbl>Banco</Lbl><input style={S.inp} placeholder="BBVA, BANAMEX…" value={form.Banco||''} onChange={e=>sf({Banco:e.target.value})}/></div>
          <div><Lbl>Contacto</Lbl><input style={S.inp} placeholder="Nombre o email" value={form.Contacto||''} onChange={e=>sf({Contacto:e.target.value})}/></div>
        </>}
        <div style={{display:'flex',gap:10,marginTop:4}}>
          <button style={{...S.btnS,flex:1}} onClick={()=>setForm(null)}>Cancelar</button>
          <button style={{...S.btnP,flex:1}} disabled={saving} onClick={tipo==='prov'?saveProv:saveRaz}>{saving?'Guardando…':'Guardar →'}</button>
        </div>
      </div>
    </Modal>}
  </div>;
}


// ── DASHBOARD EJECUTIVO ───────────────────────────────────────────
function DashboardEjecutivo({user,rol,onNavigate,onBack,pop}){
  const [sols,setSols]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('bandeja');
  const [drawer,setDrawer]=useState(null); // {sol, mode: 'aprobar'|'validar'|'finanzas'|'ver'}
  const [dNota,setDNota]=useState('');
  const [dSt,setDSt]=useState('');
  const [dFP,setDFP]=useState('');
  const [dNtFin,setDNtFin]=useState('');
  const [dMotivo,setDMotivo]=useState('');
  const [dSaving,setDSaving]=useState(false);
  const [periodo,setPeriodo]=useState('mes');
  const [filtros,setFiltros]=useState({razon:'',status:'',area:'',cc:'',desde:'',hasta:''});
  const ff=p=>setFiltros(prev=>({...prev,...p}));

  useEffect(()=>{
    spGet('Solicitudes','',2000).then(s=>{setSols(s);setLoading(false);}).catch(e=>{pop('Error: '+e.message,'err');setLoading(false);});
  },[]);

  // ── Periodo filter ───────────────────────────────────────────
  function enPeriodo(sol){
    const f=sol.Fecha_Requerida||sol.Created||'';
    const hoy=new Date(); const fd=new Date(f);
    if(periodo==='hoy') return f.startsWith(new Date().toISOString().split('T')[0]);
    if(periodo==='semana'){const s=new Date(hoy);s.setDate(hoy.getDate()-7);return fd>=s;}
    if(periodo==='mes'){const s=new Date(hoy);s.setMonth(hoy.getMonth()-1);return fd>=s;}
    if(periodo==='anio'){const s=new Date(hoy);s.setFullYear(hoy.getFullYear()-1);return fd>=s;}
    if(periodo==='custom'){
      if(filtros.desde&&f<filtros.desde) return false;
      if(filtros.hasta&&f>filtros.hasta) return false;
      return true;
    }
    return true;
  }

  const solsFiltradas=sols.filter(s=>{
    if(!enPeriodo(s)) return false;
    if(filtros.razon&&s.Razon_Social!==filtros.razon) return false;
    if(filtros.status&&s.Status!==filtros.status) return false;
    if(filtros.area&&s.Area!==filtros.area) return false;
    if(filtros.cc&&s.Centro_Costo!==filtros.cc) return false;
    return true;
  });

  const hoyStr=new Date().toISOString().split('T')[0];
  const solsHoy=sols.filter(s=>(s.Fecha_Requerida||'').startsWith(hoyStr)||s.Status==='Capturado');
  const mesStr=new Date().toISOString().slice(0,7);
  const solsMes=sols.filter(s=>(s.Fecha_Requerida||s.Created||'').startsWith(mesStr)&&s.Status==='Pagado');

  // ── KPIs ────────────────────────────────────────────────────
  const kpis=[
    {l:'Solicitudes hoy',  n:solsHoy.length, v:solsHoy.reduce((a,x)=>a+(+x.Importe||0),0), bg:'#EAF0FA',c:'#1A56A4',icon:'📅'},
    {l:'Pendientes revisión',n:sols.filter(x=>['Capturado','En revisión contable','En revisión financiera'].includes(x.Status)).length, v:sols.filter(x=>['Capturado','En revisión contable','En revisión financiera'].includes(x.Status)).reduce((a,x)=>a+(+x.Importe||0),0), bg:'#FEF3E2',c:'#C06C0A',icon:'⏳'},
    {l:'Programadas',       n:sols.filter(x=>x.Status==='Programado').length, v:sols.filter(x=>x.Status==='Programado').reduce((a,x)=>a+(+x.Importe||0),0), bg:'#EEF2F7',c:'#3D5A80',icon:'📆'},
    {l:'Pagadas del mes',   n:solsMes.length, v:solsMes.reduce((a,x)=>a+(+x.Importe||0),0), bg:'#E6F4EF',c:'#0F8A65',icon:'✅'},
  ];

  // ── Agrupadores ──────────────────────────────────────────────
  function agrupar(arr,key,top=8){
    const map={};
    arr.forEach(x=>{const k=x[key]||'Sin especificar';if(!map[k])map[k]={l:k,v:0,n:0};map[k].v+=(+x.Importe||0);map[k].n++;});
    return Object.values(map).sort((a,b)=>b.v-a.v).slice(0,top);
  }

  const COLS=['#0F8A65','#1A56A4','#6D3AB5','#C06C0A','#C8251F','#3D5A80','#059669','#7C3AED','#B45309','#DC2626'];

  // ── Bar chart ────────────────────────────────────────────────
  function BarChart({data,title,col}){
    if(!data||!data.length) return <div style={{...S.card,textAlign:'center',padding:24,color:'var(--text3)',fontSize:12}}>Sin datos</div>;
    const max=Math.max(...data.map(d=>d.v),1);
    return <div style={S.card}>
      <div style={S.h2}>{title}</div>
      {data.map((d,i)=><div key={d.l} style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
          <span style={{fontWeight:500,maxWidth:'55%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.l}</span>
          <span style={{fontFamily:'monospace',fontWeight:700,color:col||COLS[i%COLS.length]}}>{fmt(d.v)}</span>
        </div>
        <div style={{height:7,borderRadius:4,background:'var(--bg3)'}}>
          <div style={{height:'100%',borderRadius:4,background:col||COLS[i%COLS.length],width:(d.v/max*100)+'%',transition:'width .6s ease'}}/>
        </div>
        <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{d.n} solicitud{d.n!==1?'es':''}</div>
      </div>)}
    </div>;
  }

  // ── Donut chart ──────────────────────────────────────────────
  function DonutChart({data,title}){
    if(!data||!data.length) return null;
    const total=data.reduce((a,d)=>a+d.v,0)||1;
    let cumAngle=-Math.PI/2;
    const cx=80,cy=80,r=60,inner=35;
    const paths=data.map((d,i)=>{
      const angle=(d.v/total)*Math.PI*2;
      const x1=cx+r*Math.cos(cumAngle),y1=cy+r*Math.sin(cumAngle);
      cumAngle+=angle;
      const x2=cx+r*Math.cos(cumAngle),y2=cy+r*Math.sin(cumAngle);
      const xi1=cx+inner*Math.cos(cumAngle-angle),yi1=cy+inner*Math.sin(cumAngle-angle);
      const xi2=cx+inner*Math.cos(cumAngle),yi2=cy+inner*Math.sin(cumAngle);
      const lg=angle>Math.PI?1:0;
      return {path:`M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${lg},0 ${xi1},${yi1} Z`,col:COLS[i%COLS.length],d};
    });
    return <div style={S.card}>
      <div style={S.h2}>{title}</div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <svg width="160" height="160" viewBox="0 0 160 160">
          {paths.map((p,i)=><path key={i} d={p.path} fill={p.col} opacity=".9"/>)}
          <text x="80" y="76" textAnchor="middle" fontSize="11" fill="var(--text2)">Total</text>
          <text x="80" y="92" textAnchor="middle" fontSize="12" fontWeight="bold" fill="var(--text)">{sols.length}</text>
        </svg>
        <div style={{flex:1}}>
          {paths.map((p,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:p.col,flexShrink:0}}/>
              <span style={{fontSize:11,color:'var(--text2)'}}>{p.d.l}</span>
            </div>
            <span style={{fontSize:11,fontWeight:600,fontFamily:'monospace',color:p.col}}>{p.d.n}</span>
          </div>)}
        </div>
      </div>
    </div>;
  }

  // ── Funnel ───────────────────────────────────────────────────
  function FunnelChart(){
    const steps=[
      {l:'Capturadas',   st:['Capturado']},
      {l:'En contabilidad', st:['En revisión contable','Rechazado por contabilidad','Autorizado por contabilidad']},
      {l:'En finanzas',  st:['En revisión financiera']},
      {l:'Programadas',  st:['Programado']},
      {l:'Pagadas',      st:['Pagado']},
    ];
    const data=steps.map(s=>({...s,n:sols.filter(x=>s.st.includes(x.Status)).length,v:sols.filter(x=>s.st.includes(x.Status)).reduce((a,x)=>a+(+x.Importe||0),0)}));
    const maxN=Math.max(...data.map(d=>d.n),1);
    return <div style={S.card}>
      <div style={S.h2}>Flujo de autorización — dónde se atoran las solicitudes</div>
      {data.map((d,i)=><div key={d.l} style={{marginBottom:8}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
          <span style={{fontWeight:600,color:COLS[i]}}>{d.l}</span>
          <div style={{display:'flex',gap:12}}>
            <span style={{fontWeight:700,color:COLS[i]}}>{d.n} sol.</span>
            <span style={{fontFamily:'monospace',color:'var(--text2)'}}>{fmt(d.v)}</span>
          </div>
        </div>
        <div style={{height:10,borderRadius:4,background:'var(--bg3)'}}>
          <div style={{height:'100%',borderRadius:4,background:COLS[i],width:(d.n/maxN*100)+'%',transition:'width .6s ease'}}/>
        </div>
        {i<data.length-1&&d.n>0&&data[i+1].n<d.n&&<div style={{fontSize:10,color:'var(--orange)',textAlign:'right',marginTop:2}}>▼ {d.n-data[i+1].n} se detuvieron aquí</div>}
      </div>)}
    </div>;
  }

  // ── Pagado vs Pendiente ──────────────────────────────────────
  function PagoVsPendiente(){
    const pagado=sols.filter(x=>x.Status==='Pagado').reduce((a,x)=>a+(+x.Importe||0),0);
    const pendiente=sols.filter(x=>!['Pagado','Cancelado','Rechazado','Rechazado por contabilidad'].includes(x.Status)).reduce((a,x)=>a+(+x.Importe||0),0);
    const programado=sols.filter(x=>x.Status==='Programado').reduce((a,x)=>a+(+x.Importe||0),0);
    const total=pagado+pendiente||1;
    return <div style={S.card}>
      <div style={S.h2}>Pagado vs Pendiente</div>
      <div style={{display:'flex',height:20,borderRadius:10,overflow:'hidden',marginBottom:16}}>
        <div style={{width:(pagado/total*100)+'%',background:'#0F8A65',transition:'width .6s'}}/>
        <div style={{width:(programado/total*100)+'%',background:'#1A56A4',transition:'width .6s'}}/>
        <div style={{width:((pendiente-programado)/total*100)+'%',background:'#FEF3E2',borderLeft:'2px solid #C06C0A',transition:'width .6s'}}/>
      </div>
      {[{l:'Pagado',v:pagado,c:'#0F8A65',bg:'#E6F4EF'},{l:'Programado',v:programado,c:'#1A56A4',bg:'#EAF0FA'},{l:'Pendiente de pagar',v:pendiente,c:'#C06C0A',bg:'#FEF3E2'}].map(x=><div key={x.l} style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:x.bg,borderRadius:'var(--radius)',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:600,color:x.c}}>{x.l}</span>
        <span style={{fontFamily:'monospace',fontWeight:700,color:x.c}}>{fmt(x.v)}</span>
      </div>)}
    </div>;
  }

  // ── Status donut data ────────────────────────────────────────
  const statusData=STATUS_OPTS.map(st=>({l:st,v:solsFiltradas.filter(x=>x.Status===st).length})).filter(d=>d.v>0);

  // ── Bandeja prioritaria ──────────────────────────────────────
  const bandejaHoy=[...solsHoy].sort((a,b)=>{
    const pi=['Alta','Media','Baja'];
    const pd=pi.indexOf(a.Prioridad||'Media')-pi.indexOf(b.Prioridad||'Media');
    if(pd!==0) return pd;
    return (a.Fecha_Requerida||'').localeCompare(b.Fecha_Requerida||'');
  }).slice(0,10);

  const razones=[...new Set(sols.map(x=>x.Razon_Social).filter(Boolean))];
  const areas=[...new Set(sols.map(x=>x.Area).filter(Boolean))];
  const centros=[...new Set(sols.map(x=>x.Centro_Costo).filter(Boolean))];


  function openDrawer(sol){
    const mode=
      ['Capturado'].includes(sol.Status)&&ROLES_MODS[rol]?.includes('aprobaciones')?'aprobar':
      ['En revisión contable','Autorizado por contabilidad'].includes(sol.Status)&&ROLES_MODS[rol]?.includes('contabilidad')?'validar':
      ['Autorizado por contabilidad','En revisión financiera','Programado'].includes(sol.Status)&&ROLES_MODS[rol]?.includes('finanzas')?'finanzas':
      'ver';
    setDrawer({sol,mode});
    setDNota('');setDSt(sol.Status);setDFP(sol.Fecha_Programada||'');setDNtFin(sol.Notas_Finanzas||'');setDMotivo('');
  }

  async function drawerAprobar(ok){
    if(!ok&&!dNota.trim()){return;}
    setDSaving(true);
    const nextStatus=ok?'En revisión contable':'Rechazado';
    try{
      await spPatch('Solicitudes',drawer.sol.Id,{Status:nextStatus,Notas_Finanzas:dNota||''});
      await spPost('Bitacora',{Title:ok?'Aprobó':'Rechazó',Usuario:user.displayName,Accion:ok?'Aprobó solicitud':'Rechazó solicitud',Detalle:(drawer.sol.Folio||drawer.sol.Title)+' → '+nextStatus,Modulo:'Dashboard',Fecha:new Date().toISOString()});
      setSols(prev=>prev.map(x=>x.Id===drawer.sol.Id?{...x,Status:nextStatus}:x));
      setDrawer(null);
    }catch(e){console.error(e);}
    setDSaving(false);
  }

  async function drawerFinanzas(){
    setDSaving(true);
    const notaF=dMotivo?dNtFin+(dNtFin?'\n':'')+'Reprogramado: '+dMotivo:dNtFin;
    try{
      await spPatch('Solicitudes',drawer.sol.Id,{Status:dSt,Fecha_Programada:dFP||null,Notas_Finanzas:notaF,Fecha_Pago:dSt==='Pagado'?new Date().toISOString().split('T')[0]:null});
      await spPost('Bitacora',{Title:'Actualizó pago',Usuario:user.displayName,Accion:'Actualizó pago',Detalle:(drawer.sol.Folio||drawer.sol.Title)+' → '+dSt,Modulo:'Dashboard',Fecha:new Date().toISOString()});
      setSols(prev=>prev.map(x=>x.Id===drawer.sol.Id?{...x,Status:dSt,Fecha_Programada:dFP,Notas_Finanzas:notaF}:x));
      setDrawer(null);
    }catch(e){console.error(e);}
    setDSaving(false);
  }

  if(loading) return <div style={{textAlign:'center',padding:60,color:'var(--text3)'}}><div style={{fontSize:32,marginBottom:12}}>📊</div>Cargando dashboard…</div>;

  return <div className="fade-in">
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
      <div>
        <div style={S.h1}>Dashboard Ejecutivo</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{solsFiltradas.length} solicitudes en el periodo seleccionado</div>
      </div>
      {onBack&&<button style={S.btnS} onClick={onBack}>← Portal</button>}
    </div>

    {/* Filtros globales */}
    <div style={{...S.card,padding:'12px 16px',marginBottom:16,background:'var(--bg2)'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
        <div>
          <label style={S.lbl}>Periodo</label>
          <div style={{display:'flex',gap:4}}>
            {[{id:'hoy',l:'Hoy'},{id:'semana',l:'Semana'},{id:'mes',l:'Mes'},{id:'anio',l:'Año'},{id:'custom',l:'Custom'}].map(p=><button key={p.id} onClick={()=>setPeriodo(p.id)} style={{padding:'5px 10px',borderRadius:20,border:'1px solid '+(periodo===p.id?'var(--green)':'var(--border)'),background:periodo===p.id?'var(--green)':'transparent',color:periodo===p.id?'white':'var(--text2)',fontSize:11,fontWeight:periodo===p.id?600:400,cursor:'pointer'}}>{p.l}</button>)}
          </div>
        </div>
        {periodo==='custom'&&<>
          <div><label style={S.lbl}>Desde</label><input type="date" style={{...S.inp,width:130}} value={filtros.desde} onChange={e=>ff({desde:e.target.value})}/></div>
          <div><label style={S.lbl}>Hasta</label><input type="date" style={{...S.inp,width:130}} value={filtros.hasta} onChange={e=>ff({hasta:e.target.value})}/></div>
        </>}
        <div><label style={S.lbl}>Razón social</label>
          <select style={{...S.sel,width:150}} value={filtros.razon} onChange={e=>ff({razon:e.target.value})}>
            <option value="">Todas</option>{razones.map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Área</label>
          <select style={{...S.sel,width:130}} value={filtros.area} onChange={e=>ff({area:e.target.value})}>
            <option value="">Todas</option>{areas.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Centro de costo</label>
          <select style={{...S.sel,width:140}} value={filtros.cc} onChange={e=>ff({cc:e.target.value})}>
            <option value="">Todos</option>{centros.map(cc=><option key={cc}>{cc}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Status</label>
          <select style={{...S.sel,width:160}} value={filtros.status} onChange={e=>ff({status:e.target.value})}>
            <option value="">Todos</option>{STATUS_OPTS.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        {(filtros.razon||filtros.area||filtros.cc||filtros.status)&&
          <button style={{...S.btnS,fontSize:11,alignSelf:'flex-end'}} onClick={()=>setFiltros({razon:'',status:'',area:'',cc:'',desde:'',hasta:''})}>× Limpiar</button>}
      </div>
    </div>

    {/* KPIs */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
      {kpis.map(k=><div key={k.l} onClick={()=>setTab('bandeja')} style={{background:k.bg,borderRadius:'var(--radius-lg)',padding:'14px 16px',border:'1px solid var(--border)',cursor:'pointer',transition:'transform .15s,box-shadow .15s'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='var(--shadow-lg)';}} onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='';}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:k.c,letterSpacing:'.06em',lineHeight:1.4,maxWidth:'70%'}}>{k.l}</div>
          <span style={{fontSize:18}}>{k.icon}</span>
        </div>
        <div style={{fontSize:22,fontWeight:700,color:k.c,fontFamily:'monospace',marginTop:6}}>{k.n}</div>
        <div style={{fontSize:12,fontFamily:'monospace',color:k.c,opacity:.8,marginTop:2}}>{fmt(k.v)}</div>
        <div style={{fontSize:10,color:k.c,opacity:.6,marginTop:4}}>Ver →</div>
      </div>)}
    </div>

    {/* Tabs de contenido */}
    <div style={{display:'flex',gap:4,borderBottom:'1px solid var(--border)',marginBottom:16,flexWrap:'wrap'}}>
      {[{id:'bandeja',l:'📋 Bandeja'},{id:'graficas',l:'📊 Gráficas'},{id:'eficiencia',l:'⏱️ Eficiencia'}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'9px 16px',border:'none',borderBottom:tab===t.id?'2px solid var(--green)':'2px solid transparent',background:'transparent',cursor:'pointer',fontSize:13,fontWeight:tab===t.id?600:400,color:tab===t.id?'var(--green)':'var(--text2)',marginBottom:-1}}>{t.l}</button>)}
    </div>

    {/* Bandeja prioritaria */}
    {tab==='bandeja'&&bandejaHoy.length>0&&<div style={{...S.card,padding:0,overflow:'hidden',marginBottom:16}}>
      <div style={{padding:'10px 16px',background:'var(--bg2)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:700,fontSize:13}}>📋 Bandeja prioritaria — hoy</div>
        <span style={{fontSize:11,color:'var(--text3)'}}>{bandejaHoy.length} solicitudes</span>
      </div>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr>{['Prior.','Folio','Proveedor','Área','Centro','Importe','Status','Fecha req.'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
        <tbody>{bandejaHoy.map(x=><tr key={x.Id} onClick={()=>openDrawer(x)} style={{cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
          <td style={S.td}><Badge val={x.Prioridad||'Media'} map={PR_COL}/></td>
          <td style={{...S.td,...S.mono,color:'var(--green)',fontWeight:700}}>{x.Folio||x.Title}</td>
          <td style={S.td}><div style={{fontWeight:500,fontSize:13}}>{x.Proveedor}</div><div style={{fontSize:11,color:'var(--text2)'}}>{x.Razon_Social}</div></td>
          <td style={S.td}><div style={{fontSize:12}}>{x.Area}</div></td>
          <td style={{...S.td,fontSize:12,color:'var(--text2)'}}>{x.Centro_Costo||'—'}</td>
          <td style={{...S.td,fontFamily:'monospace',fontWeight:700}}>{fmt(x.Importe)}</td>
          <td style={S.td}><Badge val={x.Status} map={ST_COL}/></td>
          <td style={S.td}><div style={{fontSize:12,color:'var(--text2)'}}>{fmtD(x.Fecha_Requerida)}</div><SemaforoBadge fechaReq={x.Fecha_Requerida} status={x.Status}/></td>
        </tr>)}</tbody>
      </table>
    </div>}

    {/* Tab: Eficiencia operativa */}

    {/* Gráficas - only show in graficas tab */}
    {tab==='eficiencia'&&(()=>{
      // Only paid solicitudes have complete cycle
      const pagadas=solsFiltradas.filter(x=>x.Status==='Pagado'&&x.Fecha_Captura&&x.Fecha_Pago);

      function diasEntre(d1,d2){
        if(!d1||!d2) return null;
        const diff=new Date(d2)-new Date(d1);
        return Math.max(0,Math.round(diff/(1000*60*60*24)));
      }

      // Calculate average times
      const tiempos=pagadas.map(x=>({
        folio:x.Folio||x.Title,
        proveedor:x.Proveedor,
        importe:x.Importe,
        captura:x.Fecha_Captura,
        pago:x.Fecha_Pago,
        total:diasEntre(x.Fecha_Captura,x.Fecha_Pago),
      })).filter(x=>x.total!==null);

      const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;
      const avgTotal=avg(tiempos.map(x=>x.total));
      const max10=tiempos.sort((a,b)=>b.total-a.total).slice(0,10);

      // Distribution buckets
      const buckets=[
        {l:'Mismo día',n:tiempos.filter(x=>x.total===0).length,c:'#0F8A65'},
        {l:'1-3 días',n:tiempos.filter(x=>x.total>=1&&x.total<=3).length,c:'#1A56A4'},
        {l:'4-7 días',n:tiempos.filter(x=>x.total>=4&&x.total<=7).length,c:'#C06C0A'},
        {l:'8-15 días',n:tiempos.filter(x=>x.total>=8&&x.total<=15).length,c:'#6D3AB5'},
        {l:'Más de 15 días',n:tiempos.filter(x=>x.total>15).length,c:'#C8251F'},
      ].filter(b=>b.n>0);
      const maxB=Math.max(...buckets.map(b=>b.n),1);

      return <div>
        {/* KPIs de eficiencia */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
          <div style={{background:'var(--blue-bg)',borderRadius:'var(--radius-lg)',padding:'14px 16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--blue)',letterSpacing:'.06em'}}>Tiempo promedio total</div>
            <div style={{fontSize:28,fontWeight:700,color:'var(--blue)',fontFamily:'monospace',marginTop:6}}>{avgTotal}<span style={{fontSize:14,marginLeft:4}}>días</span></div>
            <div style={{fontSize:11,color:'var(--blue)',opacity:.7,marginTop:2}}>desde captura hasta pago</div>
          </div>
          <div style={{background:'var(--green-bg)',borderRadius:'var(--radius-lg)',padding:'14px 16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--green)',letterSpacing:'.06em'}}>Solicitudes analizadas</div>
            <div style={{fontSize:28,fontWeight:700,color:'var(--green)',fontFamily:'monospace',marginTop:6}}>{tiempos.length}</div>
            <div style={{fontSize:11,color:'var(--green)',opacity:.7,marginTop:2}}>pagos completados con fechas</div>
          </div>
          <div style={{background:avgTotal<=7?'var(--green-bg)':avgTotal<=15?'var(--orange-bg)':'var(--red-bg)',borderRadius:'var(--radius-lg)',padding:'14px 16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:avgTotal<=7?'var(--green)':avgTotal<=15?'var(--orange)':'var(--red)',letterSpacing:'.06em'}}>Evaluación</div>
            <div style={{fontSize:20,fontWeight:700,color:avgTotal<=7?'var(--green)':avgTotal<=15?'var(--orange)':'var(--red)',marginTop:6}}>
              {avgTotal===0?'Sin datos':avgTotal<=3?'🟢 Excelente':avgTotal<=7?'🟢 Bueno':avgTotal<=15?'🟡 Mejorable':'🔴 Crítico'}
            </div>
            <div style={{fontSize:11,opacity:.7,marginTop:2,color:avgTotal<=7?'var(--green)':avgTotal<=15?'var(--orange)':'var(--red)'}}>{avgTotal<=3?'Menos de 3 días':avgTotal<=7?'Menos de 1 semana':avgTotal<=15?'Entre 1 y 2 semanas':'Más de 2 semanas'}</div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          {/* Distribución de tiempos */}
          <div style={S.card}>
            <div style={S.h2}>Distribución de tiempos de pago</div>
            {buckets.length===0?<div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:12}}>Sin datos suficientes</div>
            :buckets.map(b=><div key={b.l} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                <span style={{fontWeight:500}}>{b.l}</span>
                <span style={{fontWeight:700,color:b.c}}>{b.n} pagos ({Math.round(b.n/tiempos.length*100)}%)</span>
              </div>
              <div style={{height:8,borderRadius:4,background:'var(--bg3)'}}>
                <div style={{height:'100%',borderRadius:4,background:b.c,width:(b.n/maxB*100)+'%',transition:'width .6s'}}/>
              </div>
            </div>)}
          </div>

          {/* Top 10 más lentos */}
          <div style={S.card}>
            <div style={S.h2}>Pagos más tardados</div>
            {max10.length===0?<div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:12}}>Sin datos</div>
            :max10.map((x,i)=><div key={x.folio} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
              <div>
                <span style={{fontFamily:'monospace',fontSize:11,fontWeight:700,color:'var(--green)'}}>{x.folio}</span>
                <div style={{fontSize:11,color:'var(--text2)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.proveedor}</div>
              </div>
              <span style={{fontSize:13,fontWeight:700,fontFamily:'monospace',color:x.total<=7?'var(--green)':x.total<=15?'var(--orange)':'var(--red)'}}>{x.total}d</span>
            </div>)}
          </div>
        </div>

        {/* Nota si no hay datos */}
        {tiempos.length===0&&<div style={{...S.card,textAlign:'center',padding:40,color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:8}}>⏱️</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Sin datos de eficiencia aún</div>
          <div style={{fontSize:12,lineHeight:1.7}}>Los indicadores aparecerán cuando haya solicitudes con status <strong>Pagado</strong> y fecha de captura registrada.</div>
        </div>}
      </div>;
    })()}

    {/* Gráficas fila 1 */}
    {tab==='graficas'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
      <BarChart data={agrupar(solsFiltradas,'Area')} title="Gastos por área" col={null}/>
      <BarChart data={agrupar(solsFiltradas,'Razon_Social')} title="Gastos por razón social" col="#1A56A4"/>
    </div>}

    {tab==='graficas'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
      <BarChart data={agrupar(solsFiltradas,'Categoria')} title="Gastos por categoría" col="#6D3AB5"/>
      <DonutChart data={statusData} title="Status de solicitudes"/>
    </div>}

      {tab==='graficas'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
      <PagoVsPendiente/>
      <BarChart data={agrupar(solsFiltradas,'Proveedor',10)} title="Top 10 proveedores" col="#C06C0A"/>
    </div>}

    {tab==='graficas'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
      <BarChart data={agrupar(solsFiltradas.filter(x=>x.Centro_Costo),'Centro_Costo',10)} title="Gastos por centro de costo / sucursal" col="#3D5A80"/>
      <FunnelChart/>
    </div>}
    {/* ── Drawer de acción ── */}
    {drawer&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',justifyContent:'flex-end'}} onClick={e=>{if(e.target===e.currentTarget)setDrawer(null);}}>
      <div style={{width:'100%',maxWidth:460,background:'var(--bg)',height:'100%',overflowY:'auto',boxShadow:'-8px 0 28px rgba(0,0,0,.2)',padding:24}} className="fade-in">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,borderBottom:'1px solid var(--border)',paddingBottom:16}}>
          <button style={{...S.btnS,padding:'6px 10px'}} onClick={()=>setDrawer(null)}>✕</button>
          <div><div style={{fontFamily:'monospace',fontWeight:700,color:'var(--green)',fontSize:13}}>{drawer.sol.Folio||drawer.sol.Title}</div><div style={{fontSize:16,fontWeight:700}}>{drawer.sol.Proveedor}</div></div>
          <div style={{marginLeft:'auto'}}><Badge val={drawer.sol.Status} map={ST_COL}/></div>
        </div>
        <div style={{...S.card,background:'var(--bg2)',padding:'12px 14px',marginBottom:16}}>
          <KV label="Área · Categoría" val={(drawer.sol.Area||'')+(drawer.sol.Categoria?' · '+drawer.sol.Categoria:'')}/>
          {drawer.sol.Centro_Costo&&<KV label="Centro de costo" val={drawer.sol.Centro_Costo}/>}
          <KV label="Razón social" val={drawer.sol.Razon_Social}/>
          <KV label="Método" val={drawer.sol.Metodo_Pago}/>
          {drawer.sol.Notas&&<div style={{marginTop:8,padding:'8px 10px',background:'#FFFBEB',borderRadius:'var(--radius)',fontSize:12,lineHeight:1.6,borderLeft:'2px solid #F59E0B'}}>{drawer.sol.Notas}</div>}
          <div style={{display:'flex',justifyContent:'space-between',marginTop:10}}><span style={{fontSize:13,color:'var(--text2)'}}>Importe</span><span style={{fontSize:20,fontWeight:700,fontFamily:'monospace',color:'var(--green)'}}>{fmt(drawer.sol.Importe)}</span></div>
          <div style={{marginTop:6}}><SemaforoBadge fechaReq={drawer.sol.Fecha_Requerida} status={drawer.sol.Status}/></div>
        </div>
        {drawer.mode==='aprobar'&&<div>
          <div style={S.h2}>Tu aprobación</div>
          <div style={{padding:'10px 12px',background:'var(--orange-bg)',borderRadius:'var(--radius)',fontSize:12,color:'var(--orange-text)',marginBottom:12,lineHeight:1.7}}>Confirma que el gasto es necesario y el monto es correcto.</div>
          <label style={S.lbl}>Notas (obligatorio si rechazas)</label>
          <textarea style={{...S.inp,minHeight:80,resize:'vertical',marginBottom:14}} value={dNota} onChange={e=>setDNota(e.target.value)} placeholder="Motivo o instrucciones…"/>
          <div style={{display:'flex',gap:10}}>
            <button style={{...S.btnR,flex:1}} onClick={()=>drawerAprobar(false)} disabled={dSaving||!dNota.trim()}>✕ Rechazar</button>
            <button style={{...S.btnP,flex:1}} onClick={()=>drawerAprobar(true)} disabled={dSaving}>✓ Aprobar →</button>
          </div>
        </div>}
        {drawer.mode==='validar'&&<div>
          <div style={S.h2}>Validación contable</div>
          <div style={{padding:'10px 12px',background:'var(--purple-bg)',borderRadius:'var(--radius)',fontSize:12,color:'var(--purple)',marginBottom:12}}>Revisa que el CFDI sea correcto antes de autorizar.</div>
          <label style={S.lbl}>Notas de contabilidad</label>
          <textarea style={{...S.inp,minHeight:80,resize:'vertical',marginBottom:14}} value={dNota} onChange={e=>setDNota(e.target.value)} placeholder="Observaciones del CFDI…"/>
          <div style={{display:'flex',gap:10}}>
            <button style={{...S.btnR,flex:1}} onClick={async()=>{setDSaving(true);await spPatch('Solicitudes',drawer.sol.Id,{Status:'Rechazado por contabilidad'});setSols(prev=>prev.map(x=>x.Id===drawer.sol.Id?{...x,Status:'Rechazado por contabilidad'}:x));setDrawer(null);setDSaving(false);}} disabled={dSaving}>✕ Rechazar</button>
            <button style={{...S.btnP,flex:1}} onClick={async()=>{setDSaving(true);await spPatch('Solicitudes',drawer.sol.Id,{Status:'Autorizado por contabilidad',Notas_Finanzas:dNota});setSols(prev=>prev.map(x=>x.Id===drawer.sol.Id?{...x,Status:'Autorizado por contabilidad'}:x));setDrawer(null);setDSaving(false);}} disabled={dSaving}>✓ Autorizar →</button>
          </div>
        </div>}
        {drawer.mode==='finanzas'&&<div>
          <div style={S.h2}>Gestión del pago</div>
          <div style={{display:'grid',gap:12}}>
            <div><label style={S.lbl}>Status</label>
              <select style={S.sel} value={dSt} onChange={e=>setDSt(e.target.value)}>
                {['En revisión financiera','Programado','Pagado','Cancelado'].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div><label style={S.lbl}>Fecha programada</label><input type="date" style={S.inp} value={dFP} onChange={e=>setDFP(e.target.value)}/></div>
            {dFP&&dFP!==drawer.sol.Fecha_Programada&&drawer.sol.Fecha_Programada&&<div style={{padding:'10px 12px',background:'var(--orange-bg)',borderRadius:'var(--radius)',border:'1px solid var(--yellow-border)'}}>
              <label style={S.lbl}>Motivo de reprogramación</label>
              <input style={S.inp} placeholder="Ej. Falta de liquidez…" value={dMotivo} onChange={e=>setDMotivo(e.target.value)}/>
            </div>}
            <div><label style={S.lbl}>Notas de finanzas</label><textarea style={{...S.inp,minHeight:60,resize:'vertical'}} value={dNtFin} onChange={e=>setDNtFin(e.target.value)} placeholder="Referencia de transferencia…"/></div>
            <button style={S.btnP} onClick={drawerFinanzas} disabled={dSaving}>{dSaving?'Guardando…':'Guardar →'}</button>
          </div>
        </div>}
        {drawer.mode==='ver'&&<div style={{...S.card,background:'var(--bg2)',fontSize:13,color:'var(--text2)',textAlign:'center',padding:20}}>Vista de solo lectura.</div>}
      </div>
    </div>}

  </div>;
}


// ── PORTAL INICIO ─────────────────────────────────────────────────
const MODS_DEF=[
  {id:'solicitudes', icon:'📋', titulo:'Solicitudes',  desc:'Crea y da seguimiento a solicitudes de pago.', color:'#0F8A65', bg:'#E6F4EF'},
  {id:'aprobaciones',icon:'✅', titulo:'Aprobaciones', desc:'Autoriza o rechaza solicitudes de gasto.',     color:'#1A56A4', bg:'#EAF0FA'},
  {id:'contabilidad', icon:'🔍', titulo:'Contabilidad', desc:'Valida CFDI con checklist de 6 puntos.',      color:'#6D3AB5', bg:'#F0EAFA'},
  {id:'finanzas',    icon:'💼', titulo:'Finanzas',     desc:'Dashboard, pagos y flujo de caja.',            color:'#C06C0A', bg:'#FEF3E2'},
  {id:'catalogos',   icon:'🗂️', titulo:'Catálogos',    desc:'Proveedores, razones sociales y categorías.',  color:'#3D5A80', bg:'#EEF2F7'},
  {id:'usuarios',    icon:'👥', titulo:'Usuarios',     desc:'Gestiona accesos y roles del portal.',          color:'#6D3AB5', bg:'#F0EAFA'},
  {id:'dashboard',    icon:'📊', titulo:'Reportes',     desc:'Solicitudes del día, por periodo y gráficas de gasto.', color:'#1A56A4', bg:'#EAF0FA'},
  {id:'bitacora',    icon:'📒', titulo:'Bitácora',     desc:'Historial de acciones y cambios en el portal.', color:'#0F8A65', bg:'#E6F4EF'},
];

function PortalInicio({user,rol,onNavigate,pendientes,onLogout}){
  const mods=MODS_DEF.filter(m=>ROLES_MODS[rol]?.includes(m.id));
  return <div style={{minHeight:'100vh',background:'var(--bg3)'}}>
    <div style={{background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'16px 32px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:36,height:36,borderRadius:10,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏗️</div>
        <div><div style={{fontSize:17,fontWeight:700}}>Portal de Pagos</div><div style={{fontSize:11,color:'var(--text3)'}}>FYTTSA · Sistema de gestión</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{fontSize:12,textAlign:'right'}}>
          <div style={{fontWeight:600}}>{user.displayName}</div>
          <div style={{color:'var(--text3)',fontSize:11}}>{rol}</div>
        </div>
        <div style={{width:34,height:34,borderRadius:'50%',background:'var(--green-bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'var(--green)'}}>{(user.displayName||'U')[0].toUpperCase()}</div>
        <button onClick={onLogout} style={{...S.btnS,fontSize:12,padding:'6px 12px',color:'var(--red-text)'}}>Salir</button>
      </div>
    </div>
    <div style={{padding:'28px 32px',maxWidth:1000,margin:'0 auto'}}>
      {DEMO_MODE&&<div style={{background:'#FEF3E2',border:'1px solid #F59E0B',borderRadius:'var(--radius)',padding:'10px 16px',marginBottom:20,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:16}}>⚠️</span>
        <span style={{fontSize:13,color:'#7A3F00',fontWeight:500}}>MODO DEMO — Los datos son ficticios. Desactiva DEMO_MODE antes de producción.</span>
      </div>}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>Bienvenido, {user.displayName?.split(' ')[0]}</div>
        <div style={{fontSize:13,color:'var(--text2)'}}>Selecciona un módulo para comenzar</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
        {mods.map(m=><div key={m.id} onClick={()=>onNavigate(m.id)} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='var(--shadow-lg)';}} onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='var(--shadow)';}} style={{background:'var(--bg)',borderRadius:16,border:'1px solid var(--border)',padding:'20px 18px',cursor:'pointer',transition:'all .18s',boxShadow:'var(--shadow)',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:m.color,borderRadius:'16px 16px 0 0'}}/>
          {m.id==='aprobaciones'&&pendientes>0&&<div style={{position:'absolute',top:12,right:12,background:'var(--red)',color:'white',borderRadius:10,fontSize:11,padding:'2px 7px',fontWeight:700}}>{pendientes}</div>}
          <div style={{width:42,height:42,borderRadius:12,background:m.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,marginBottom:12}}>{m.icon}</div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:5}}>{m.titulo}</div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.65,marginBottom:14}}>{m.desc}</div>
          <div style={{padding:'7px 12px',borderRadius:10,background:m.bg,display:'flex',justifyContent:'space-between'}}><span style={{fontSize:12,fontWeight:600,color:m.color}}>Abrir</span><span style={{color:m.color}}>→</span></div>
        </div>)}
      </div>
    </div>
  </div>;
}
// ── ERROR BOUNDARY ────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,error:null}; }
  static getDerivedStateFromError(error){ return {hasError:true,error}; }
  componentDidCatch(error,info){ console.error('Portal error:',error.message); }
  render(){
    if(this.state.hasError){
      return <div style={{padding:40,maxWidth:600,margin:'0 auto'}}>
        <div style={{background:'#FEF0EF',border:'1px solid #FCA5A5',borderRadius:12,padding:24}}>
          <div style={{fontSize:18,marginBottom:8}}>⚠️ Error en el portal</div>
          <div style={{fontSize:13,color:'#7A0F0B',marginBottom:16,fontFamily:'monospace',wordBreak:'break-all'}}>{this.state.error?.message}</div>
          <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:'#C8251F',color:'white',padding:'8px 16px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13}}>Reintentar</button>
        </div>
      </div>;
    }
    return this.props.children;
  }
}

function App(){
  const [authState,setAuthState]=useState('loading');
  const [user,setUser]=useState(null);
  const [rolInfo,setRolInfo]=useState(null);
  const [modulo,setModulo]=useState(null);
  const [toast,setToast]=useState(null);
  const [pendientes,setPendientes]=useState(0);
  const [loginError,setLoginError]=useState('');

  function pop(msg,type){setToast({msg,err:type==='err'});setTimeout(()=>setToast(null),3500);}

  useEffect(()=>{
    if(DEMO_MODE){
      setUser(DEMO_USER);
      setRolInfo({Rol:'Administrador', Correo:DEMO_USER.mail});
      setPendientes(2);
      setAuthState('app');
      setModulo('dashboard');
      return; // Skip ALL Microsoft calls
    }
    msalInstance.initialize().then(()=>{
      msalInstance.handleRedirectPromise().then(result=>{
        if(result&&result.account){
          loadUser(result.account);
        } else {
          const accounts=msalInstance.getAllAccounts();
          if(accounts.length>0){
            loadUser(accounts[0]);
          } else {
            setAuthState('login');
          }
        }
      }).catch(e=>{setAuthState('login');setLoginError(e.message);});
    });
  },[]);

  async function loadUser(account){
    setAuthState('loading');
    try{
      const token=await msalInstance.acquireTokenSilent({scopes:SCOPES,account});
      const graphR=await fetch('https://graph.microsoft.com/v1.0/me',{headers:{'Authorization':'Bearer '+token.accessToken}});
      const profile=await graphR.json();
      setUser(profile);
      // Check user in portal
      const portalUsers=await spGet('Usuarios_Portal','',500);
      const found=portalUsers.find(u=>u.Correo?.toLowerCase()===profile.mail?.toLowerCase()||u.Correo?.toLowerCase()===profile.userPrincipalName?.toLowerCase());
      if(found&&found.Activo!==false){
        setRolInfo(found);
        logBitacora(profile.displayName||profile.mail,'Inició sesión',profile.mail,'Login');
        // Set default module based on role
        if(['Administrador','Finanzas','Contador'].includes(found.Rol)) setModulo('dashboard');
        // Count pending approvals
        const sols=await spGet('Solicitudes','Status eq \'Capturado\'',100);
        setPendientes(sols.length);
        setAuthState('app');
      } else if(!found){
        // First time - check if no users exist yet (first admin)
        if(portalUsers.length===0){
          // Create as admin
          await spPost('Usuarios_Portal',{Title:profile.mail,Correo:profile.mail,Rol:'Administrador',Activo:true});
          setRolInfo({Rol:'Administrador',Correo:profile.mail});
          setAuthState('app');
        } else {
          setAuthState('noAccess');
        }
      } else {
        setAuthState('noAccess');
      }
    }catch(e){
      setAuthState('login');
      setLoginError('Error al cargar perfil: '+e.message);
    }
  }

  async function login(){
    setLoginError('');
    try{
      await msalInstance.loginRedirect({scopes:SCOPES});
    }catch(e){
      if(!e.message?.includes('user_cancelled')){
        setLoginError('Error al iniciar sesión: '+e.message);
      }
    }
  }

  const rol=rolInfo?.Rol||'Solicitante';

  if(authState==='loading') return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'var(--bg3)'}}>
    <div style={{width:48,height:48,borderRadius:12,background:'var(--green-bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>🏗️</div>
    <div style={{fontSize:14,color:'var(--text2)'}}>Cargando portal…</div>
  </div>;

  if(authState==='noAccess') return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg3)'}}>
    <div style={{background:'var(--bg)',borderRadius:16,padding:32,maxWidth:400,textAlign:'center',boxShadow:'var(--shadow-lg)'}}>
      <div style={{fontSize:32,marginBottom:12}}>🔒</div>
      <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Sin acceso</div>
      <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>Tu cuenta <strong>{user?.mail}</strong> no tiene acceso al portal. Contacta al administrador para que te agregue.</div>
    </div>
  </div>;

  if(authState==='login') return <LoginScreen onLogin={login} loading={false} error={loginError}/>;

  return <ErrorBoundary><div>
    {!modulo&&<PortalInicio user={user} rol={rol} onNavigate={setModulo} pendientes={pendientes} onLogout={()=>{if(DEMO_MODE){setUser(null);setRolInfo(null);setModulo(null);setAuthState('login');return;}msalInstance.logoutRedirect();}}/>}
    {modulo==='solicitudes'&&ROLES_MODS[rol]?.includes('solicitudes')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><ModSolicitudes user={user} rol={rol} onBack={()=>setModulo(null)} pop={pop}/></div>}
    {modulo==='aprobaciones'&&ROLES_MODS[rol]?.includes('aprobaciones')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><ModAprobaciones user={user} rol={rol} onBack={()=>setModulo(null)} pop={pop}/></div>}
    {modulo==='finanzas'&&ROLES_MODS[rol]?.includes('finanzas')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><ModFinanzas user={user} rol={rol} onBack={()=>setModulo(null)} pop={pop}/></div>}
    {modulo==='dashboard'&&ROLES_MODS[rol]?.includes('dashboard')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><DashboardEjecutivo user={user} rol={rol} onBack={()=>setModulo(null)} pop={pop}/></div>}
    {modulo==='contabilidad'&&ROLES_MODS[rol]?.includes('contabilidad')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><ModContabilidad user={user} rol={rol} onBack={()=>setModulo(null)} pop={pop}/></div>}
    {modulo==='catalogos'&&ROLES_MODS[rol]?.includes('catalogos')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><ModCatalogos user={user} onBack={()=>setModulo(null)} pop={pop}/></div>}
    {modulo==='usuarios'&&ROLES_MODS[rol]?.includes('usuarios')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><ModUsuarios user={user} onBack={()=>setModulo(null)} pop={pop}/></div>}
    {modulo==='bitacora'&&ROLES_MODS[rol]?.includes('bitacora')&&<div style={{minHeight:'100vh',background:'var(--bg3)',padding:'24px 28px'}}><ModBitacora user={user} onBack={()=>setModulo(null)} pop={pop}/></div>}

    <Toast t={toast}/>
  </div></ErrorBoundary>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
